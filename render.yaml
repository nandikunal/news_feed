services:
  - type: web
    name: rss-news-api
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: API_KEY
        generateValue: true
      - key: ADMIN_API_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://yourapp.com
